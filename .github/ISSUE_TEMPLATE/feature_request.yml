name: Feature Request
description: Suggest a new Java SDK feature or improvement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting an improvement. We especially value ideas that make the API easier to use correctly.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this solve for Java developers?
      placeholder: I'm trying to...
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the API or behavior you would like.
      placeholder: I would like...
    validations:
      required: true

  - type: textarea
    id: java-api
    attributes:
      label: Java API Sketch
      description: Optional code sketch of the API you wish existed.
      render: java

  - type: dropdown
    id: category
    attributes:
      label: Feature Category
      options:
        - High-level Agent/Run API
        - Low-level AutohandSDK/RPC API
        - Events and streaming
        - Permissions and safety
        - Hooks or MCP
        - Structured JSON output
        - Examples or documentation
        - Build, packaging, or release
        - Other
    validations:
      required: true

  - type: dropdown
    id: importance
    attributes:
      label: Importance
      options:
        - Nice to have
        - Would significantly improve my workflow
        - Critical - blocking my use of the SDK
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      placeholder: I have tried...

  - type: checkboxes
    id: contribution
    attributes:
      label: Contribution
      options:
        - label: I would be willing to help implement this feature.
        - label: I searched existing feature requests for this idea.
          required: true
